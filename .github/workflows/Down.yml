name: Stable Download and Split Any File New

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل'
        required: true
        type: string
      file_name:
        description: 'نام فایل خروجی'
        required: true
        type: string
      branch_name:
        description: 'اسم برنچ در گیت‌هاب'
        required: true
        type: string
        default: 'downloads'
      chunk_size_mb:
        description: 'سایز هر قطعه (MB) - حداکثر 48 پیشنهاد می‌شود'
        required: false
        type: string
        default: '48'

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Download file (with resume)
        run: |
          echo "Downloading from: ${{ inputs.file_url }}"
          echo "Saving as: ${{ inputs.file_name }}"
          wget -c --progress=dot:giga -O "${{ inputs.file_name }}" "${{ inputs.file_url }}"
          ls -lh "${{ inputs.file_name }}"

      - name: Split into chunks
        run: |
          echo "Splitting ${{ inputs.file_name }} into ${{ inputs.chunk_size_mb }}MB chunks..."
          split -b "${{ inputs.chunk_size_mb }}m" -- "${{ inputs.file_name }}" "part_"
          
          n=1
          for f in part_*; do
            mv -- "$f" "$(printf "%03d" $n).part"
            n=$((n+1))
          done
          
          sha256sum -- "${{ inputs.file_name }}" > checksum.txt
          
          cat > reassemble.sh << 'EOF'
#!/bin/bash
set -e
echo "Reassembling file..."
cat *.part > "reconstructed_file"
echo "Verifying checksum..."
sha256sum -c checksum.txt
if [ $? -eq 0 ]; then
   mv "reconstructed_file" "$(cat checksum.txt | cut -d ' ' -f 3-)"
   echo "✅ Success! File reassembled successfully."
   ls -lh "$(cat checksum.txt | cut -d ' ' -f 3-)"
else
   echo "❌ Error: File corrupted"
   exit 1
fi
EOF
          chmod +x reassemble.sh
          
          echo "Total chunks: $(ls *.part | wc -l)"

      - name: Setup orphan branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # تنظیمات مهم برای جلوگیری از timeout
          git config http.postBuffer 524288000
          git config http.version HTTP/1.1
          git config --global core.compression 0
          
          git checkout --orphan "${{ inputs.branch_name }}"
          git rm -rf . 2>/dev/null || true

      - name: Upload metadata first
        run: |
          git add checksum.txt reassemble.sh
          git commit -m "Add metadata for ${{ inputs.file_name }}"
          git push origin "${{ inputs.branch_name }}" --force

      - name: Upload chunks with retry and delay
        run: |
          echo "Starting chunk upload with optimized settings..."
          
          files=()
          count=0
          BATCH_SIZE=3
          
          for f in *.part; do
            files+=("$f")
            count=$((count+1))
            
            if [ $count -eq $BATCH_SIZE ]; then
              echo "Uploading batch of $BATCH_SIZE chunks: ${files[*]}"
              
              git add "${files[@]}"
              git commit -m "Add chunks batch $(date +%s)"
              
              # Push with retry
              for attempt in {1..3}; do
                if git push origin "${{ inputs.branch_name }}"; then
                  echo "✅ Batch uploaded successfully"
                  break
                else
                  echo "❌ Push failed (attempt $attempt/3). Retrying in 12 seconds..."
                  sleep 12
                fi
              done
              
              sleep 10
              files=()
              count=0
            fi
          done
          
          # Upload remaining files
          if [ $count -gt 0 ]; then
            echo "Uploading remaining $count chunks: ${files[*]}"
            git add "${files[@]}"
            git commit -m "Add remaining chunks for ${{ inputs.file_name }}"
            
            for attempt in {1..3}; do
              if git push origin "${{ inputs.branch_name }}"; then
                echo "✅ Remaining chunks uploaded successfully"
                break
              else
                echo "❌ Final push failed (attempt $attempt/3). Retrying..."
                sleep 15
              fi
            done
          fi
          
          echo "=========================================="
          echo "✅ ALL CHUNKS UPLOADED SUCCESSFULLY!"
          echo "=========================================="
          echo "برای دانلود و بازسازی فایل:"
          echo "git clone --branch ${{ inputs.branch_name }} https://github.com/${{ github.repository }}.git download-folder"
          echo "cd download-folder"
          echo "bash reassemble.sh"
          echo "=========================================="
