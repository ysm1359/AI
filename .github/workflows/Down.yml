name: Split and Upload Large Model to Git Branch

on:
  workflow_dispatch:

jobs:
  split-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download the 4.5GB model
        run: |
          if [ -f "model.safetensors" ]; then
            echo "✅ Model already exists, skipping download"
            ls -lh model.safetensors
          else
            echo "Downloading model..."
            wget -O model.safetensors "https://modelscope.cn/models/ACE-Step/acestep-v15-base/resolve/master/model.safetensors"
            ls -lh model.safetensors
          fi

      - name: Split into 95MB chunks
        run: |
          if [ -f "part_001.part" ]; then
            echo "✅ Chunks already exist, skipping split"
          else
            split -b 95m model.safetensors part_
            
            n=1
            for f in part_*; do 
              mv "$f" "part_$(printf "%03d" $n).part"
              n=$((n+1))
            done
            
            sha256sum model.safetensors > checksum.txt
            
            cat > reassemble.sh << 'EOF'
            #!/bin/bash
            echo "Reassembling model.safetensors..."
            cat part_*.part > model.safetensors
            echo "Verifying..."
            sha256sum -c checksum.txt
            if [ $? -eq 0 ]; then
              echo "✅ Success!"
              ls -lh model.safetensors
            else
              echo "❌ Error: File corrupted"
            fi
            EOF
            chmod +x reassemble.sh
          fi
          
          echo "Total chunks: $(ls part_*.part 2>/dev/null | wc -l)"

      - name: Create orphan branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git ls-remote --heads origin model-files | grep -q model-files; then
            echo "Branch exists, checking out..."
            git fetch origin model-files
            git checkout model-files
          else
            git checkout --orphan model-files
            rm -rf .github 2>/dev/null || true
          fi

      - name: Push chunks one by one (分批推送)
        run: |
          # اول checksum و reassemble.sh را بفرست (اگه موجود نباشن)
          if ! git ls-files --error-unmatch checksum.txt >/dev/null 2>&1; then
            git add checksum.txt reassemble.sh
            git commit -m "Add checksum and reassemble script"
            git push origin model-files --force
          fi
          
          # پیدا کردن آخرین قطعه آپلود شده
          last_chunk=""
          for f in $(ls part_*.part 2>/dev/null | sort); do
            if git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              last_chunk="$f"
              echo "✅ Already uploaded: $f"
            fi
          done
          
          # شروع از قطعه بعدی
          start_uploading=false
          if [ -z "$last_chunk" ]; then
            start_uploading=true
          fi
          
          # آپلود تک تک با قابلیت ادامه
          for f in $(ls part_*.part 2>/dev/null | sort); do
            if [ "$f" = "$last_chunk" ]; then
              start_uploading=true
              continue
            fi
            
            if [ "$start_uploading" = true ]; then
              echo "Uploading: $f"
              git add "$f"
              git commit -m "Add $f"
              
              # تلاش مجدد در صورت خطا
              max_retries=5
              retry=0
              while [ $retry -lt $max_retries ]; do
                if git push origin model-files; then
                  echo "✅ Uploaded: $f"
                  break
                else
                  retry=$((retry+1))
                  if [ $retry -lt $max_retries ]; then
                    echo "⚠️ Retry $retry/$max_retries in 10 seconds..."
                    sleep 10
                  fi
                fi
              done
              
              if [ $retry -eq $max_retries ]; then
                echo "❌ Failed to upload $f, will continue from here next time"
                exit 1
              fi
              
              # صبر کوتاه بین آپلودها
              sleep 3
            fi
          done
          
          echo "=========================================="
          echo "✅ DONE! All chunks uploaded successfully."
          echo "=========================================="
