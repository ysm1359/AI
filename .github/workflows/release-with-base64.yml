name: Upload Model as Base64 Text Files to Release

on:
  workflow_dispatch:
    inputs:
      model_url:
        description: 'Direct download link'
        required: true
        default: 'https://modelscope.cn/models/ACE-Step/acestep-v15-base/resolve/master/model.safetensors'

jobs:
  upload-to-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download model
        run: |
          echo "Downloading 4.5GB model..."
          wget --progress=dot:giga -O model.safetensors "${{ github.event.inputs.model_url }}"
          ls -lh model.safetensors

      - name: Split into 95MB chunks and convert to base64
        run: |
          # Split into 95MB chunks
          split -b 95m model.safetensors chunk_
          
          # Convert each chunk to base64 text file
          n=1
          for f in chunk_*; do
            output_file="part_$(printf "%03d" $n).txt"
            echo "Converting $f to $output_file..."
            base64 -w 0 "$f" > "$output_file"
            n=$((n+1))
          done
          
          # Create checksum of original file
          sha256sum model.safetensors > checksum.txt
          
          # Create reassemble script for offline system
          cat > reassemble.sh << 'EOF'
          #!/bin/bash
          echo "Reassembling model.safetensors from base64 text files..."
          
          # Convert each text file back to binary chunk
          for txt in part_*.txt; do
            chunk_file="${txt%.txt}.chunk"
            echo "Decoding $txt..."
            base64 -d "$txt" > "$chunk_file"
          done
          
          # Combine chunks
          cat part_*.chunk > model.safetensors
          
          # Clean up
          rm part_*.chunk
          
          # Verify
          echo "Verifying integrity..."
          sha256sum -c checksum.txt
          
          if [ $? -eq 0 ]; then
            echo "✅ Success! File is intact."
            ls -lh model.safetensors
          else
            echo "❌ Checksum failed!"
          fi
          EOF
          chmod +x reassemble.sh
          
          echo "Created $(ls part_*.txt | wc -l) base64 text files"

      - name: Create Release
        run: |
          # Delete old release if exists
          gh release delete model-base64 --yes || true
          
          # Create new release with all text files
          gh release create model-base64 part_*.txt reassemble.sh checksum.txt \
            --title "Model as Base64 Text Files" \
            --notes "Download all .txt files and run 'bash reassemble.sh' to get the original model.safetensors (4.5GB)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print download instructions
        run: |
          echo "=========================================="
          echo "✅ Release created successfully!"
          echo ""
          echo "Download from:"
          echo "https://github.com/${{ github.repository }}/releases/tag/model-base64"
          echo ""
          echo "On your offline system:"
          echo "1. Download all .txt files and reassemble.sh"
          echo "2. Run: bash reassemble.sh"
          echo "=========================================="
