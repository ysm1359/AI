name: Stable Download and Split Any File

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل'
        required: true
        type: string
      file_name:
        description: 'نام فایل خروجی'
        required: true
        type: string
      branch_name:
        description: 'اسم برنچ در گیت‌هاب'
        required: true
        type: string
        default: 'downloads'
      chunk_size_mb:
        description: 'سایز هر قطعه (MB)'
        required: false
        type: string
        default: '95'

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Download file (with resume)
        run: |
          echo "Downloading from: ${{ inputs.file_url }}"
          echo "Saving as: ${{ inputs.file_name }}"
          wget -c --progress=dot:giga -O "${{ inputs.file_name }}" "${{ inputs.file_url }}"
          ls -lh "${{ inputs.file_name }}"

      - name: Split into chunks (safe method)
        run: |
          echo "Splitting ${{ inputs.file_name }} into ${{ inputs.chunk_size_mb }}MB chunks..."
          # استفاده از -- برای جلوگیری از اشتباه گرفتن文件名 با آپشن
          split -b "${{ inputs.chunk_size_mb }}m" -- "${{ inputs.file_name }}" "part_"
          
          # Rename files to have numeric names
          n=1
          for f in part_*; do
            mv -- "$f" "$(printf "%03d" $n).part"
            n=$((n+1))
          done
          
          # Create checksum
          sha256sum -- "${{ inputs.file_name }}" > checksum.txt
          
          # Create reassemble script
          cat > reassemble.sh << 'EOF'
          #!/bin/bash
          set -e
          echo "Reassembling file..."
          cat *.part > "reconstructed_file"
          echo "Verifying..."
          sha256sum -c checksum.txt
          if [ $? -eq 0 ]; then
             mv "reconstructed_file" "$(cat checksum.txt | cut -d ' ' -f 3-)"
             echo "✅ Success! File is intact."
             ls -lh "$(cat checksum.txt | cut -d ' ' -f 3-)"
          else
             echo "❌ Error: File corrupted. Checksum mismatch."
             exit 1
          fi
          EOF
          chmod +x reassemble.sh
          
          echo "Total chunks created: $(ls *.part | wc -l)"

      - name: Setup branch and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan "${{ inputs.branch_name }}"
          git rm -rf . 2>/dev/null || true
          git add checksum.txt reassemble.sh *.part
          git commit -m "Add file: ${{ inputs.file_name }}"
          git push origin "${{ inputs.branch_name }}" --force
          
          echo "=========================================="
          echo "✅ Successfully uploaded to branch: ${{ inputs.branch_name }}"
          echo "To download on your system:"
          echo "git clone --branch ${{ inputs.branch_name }} https://github.com/${{ github.repository }}.git download-folder"
          echo "cd download-folder"
          echo "bash reassemble.sh"
          echo "=========================================="
