name: Download Model and Save as Artifact

on:
  workflow_dispatch:
    inputs:
      model_url:
        description: 'Direct download link'
        required: true
        default: 'https://modelscope.cn/models/ACE-Step/acestep-v15-base/resolve/master/model.safetensors'

jobs:
  download-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Download model
        run: |
          echo "Downloading 4.5GB model. This will take 10-15 minutes..."
          wget --progress=dot:giga -O model.safetensors "${{ github.event.inputs.model_url }}"
          ls -lh model.safetensors

      - name: Split into 95MB chunks
        run: |
          # Split into 95MB chunks
          split -b 95m model.safetensors part_
          
          # Rename chunks with proper numbering
          n=1
          for f in part_*; do
            mv "$f" "part_$(printf "%03d" $n).part"
            n=$((n+1))
          done
          
          # Create checksum
          sha256sum model.safetensors > checksum.txt
          
          # Create reassemble script
          cat > reassemble.sh << 'EOF'
          #!/bin/bash
          echo "Reassembling model.safetensors from parts..."
          cat part_*.part > model.safetensors
          echo "Checking integrity..."
          sha256sum -c checksum.txt
          if [ $? -eq 0 ]; then
            echo "✅ Success! File is intact."
            ls -lh model.safetensors
          else
            echo "❌ Checksum failed. File is corrupted."
          fi
          EOF
          chmod +x reassemble.sh
          
          echo "Total chunks: $(ls part_*.part | wc -l)"

      - name: Upload all chunks as artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-chunks-95mb
          path: |
            part_*.part
            reassemble.sh
            checksum.txt
          if-no-files-found: error
          retention-days: 7

      - name: Upload single file (if small enough)
        uses: actions/upload-artifact@v4
        with:
          name: model-complete
          path: model.safetensors
          if-no-files-found: warn
          retention-days: 7
