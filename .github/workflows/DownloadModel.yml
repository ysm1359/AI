name: Download Large Model, Split into Chunks, and Upload to Repo

on:
  workflow_dispatch:
    inputs:
      model_url:
        description: 'Direct download link'
        required: true
        default: 'https://modelscope.cn/models/ACE-Step/acestep-v15-base/resolve/master/model.safetensors'
      chunk_size_mb:
        description: 'Chunk size in MB (GitHub <100MB recommended)'
        required: true
        default: 95

jobs:
  split-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download model
        run: |
          echo "Downloading 5GB model. This will take time..."
          wget --progress=dot:giga -O model.safetensors "${{ github.event.inputs.model_url }}"
          ls -lh model.safetensors

      - name: Split into chunks
        run: |
          CHUNK_SIZE=$(( ${{ github.event.inputs.chunk_size_mb }} * 1024 * 1024 ))
          split -b $CHUNK_SIZE model.safetensors part_
          
          # Rename chunks with proper numbering
          n=1
          for f in part_*; do
            if [[ "$f" != "part_"* ]] || [[ "$f" == "part_" ]]; then continue; fi
            newname=$(printf "part_%03d.part" $n)
            mv "$f" "$newname"
            n=$((n+1))
          done
          
          # Create checksum file
          sha256sum model.safetensors > checksum.txt
          
          # Create reassemble script for your offline system
          cat > reassemble.sh << 'EOF'
          #!/bin/bash
          echo "Reassembling model.safetensors from parts..."
          cat part_*.part > model.safetensors
          echo "Checking integrity..."
          sha256sum -c checksum.txt
          if [ $? -eq 0 ]; then
            echo "✅ Success! File is intact."
            ls -lh model.safetensors
          else
            echo "❌ Checksum failed. File is corrupted."
          fi
          EOF
          chmod +x reassemble.sh
          
          echo "Split into $(ls part_*.part 2>/dev/null | wc -l) chunks"

      - name: Create and switch to chunks branch
        run: |
          git checkout --orphan model-chunks
          git rm -rf . 2>/dev/null || true
          # Remove workflow files from chunks branch
          rm -rf .github 2>/dev/null || true
          # Copy only the chunk files
          cp ../part_*.part . 2>/dev/null || true
          cp ../reassemble.sh . 2>/dev/null || true
          cp ../checksum.txt . 2>/dev/null || true
          
          # Add all files
          git add part_*.part reassemble.sh checksum.txt 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Add model chunks - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin model-chunks --force

      - name: Create info file on main branch
        run: |
          git checkout main
          
          cat > MODEL_INFO.md << EOF
          # Model Download Info
          
          - **Original URL:** ${{ github.event.inputs.model_url }}
          - **Total size:** 4.5GB
          - **Chunks:** 95MB each
          - **Branch name:** \`model-chunks\`
          
          ## How to download (you have internet only for GitHub):
          
          ### Method 1: Clone the branch (recommended)
          \`\`\`bash
          git clone --branch model-chunks https://github.com/${{ github.repository }}.git model-files
          cd model-files
          bash reassemble.sh
          \`\`\`
          
          ### Method 2: Download individual chunks from browser
          Go to: https://github.com/${{ github.repository }}/tree/model-chunks
          
          Download all \`.part\` files, then run:
          \`\`\`bash
          cat part_*.part > model.safetensors
          sha256sum -c checksum.txt
          \`\`\`
          
          ## Checksum (for verification)
          \`\`\`
          $(cat checksum.txt)
          \`\`\`
          EOF
          
          git add MODEL_INFO.md
          git commit -m "Add model download instructions" || echo "No changes to commit"
          git push origin main
