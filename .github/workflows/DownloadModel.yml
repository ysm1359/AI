name: Download Large Model, Split into Chunks, and Upload to Repo

on:
  workflow_dispatch:
    inputs:
      model_url:
        description: 'Direct download link'
        required: true
        default: 'https://modelscope.cn/models/ACE-Step/acestep-v15-base/resolve/master/model.safetensors'
      chunk_size_mb:
        description: 'Chunk size in MB (GitHub <100MB recommended)'
        required: true
        default: 95

jobs:
  split-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download model
        run: |
          echo "Downloading 5GB model. This will take time..."
          wget --progress=dot:giga -O model.safetensors "${{ github.event.inputs.model_url }}"
          ls -lh model.safetensors

      - name: Split into chunks
        run: |
          CHUNK_SIZE=$(( ${{ github.event.inputs.chunk_size_mb }} * 1024 * 1024 ))
          split -b $CHUNK_SIZE model.safetensors chunk_
          
          # Rename chunks with better names
          n=1
          for f in chunk_*; do
            mv "$f" "part_$(printf "%03d" $n).part"
            n=$((n+1))
          done
          
          # Create checksum file
          sha256sum model.safetensors > checksum.txt
          
          # Create reassemble script for your offline system
          cat > reassemble.sh << 'EOF'
          #!/bin/bash
          echo "Reassembling model.safetensors from parts..."
          cat part_*.part > model.safetensors
          echo "Checking integrity..."
          sha256sum -c checksum.txt
          if [ $? -eq 0 ]; then
            echo "✅ Success! File is intact."
          else
            echo "❌ Checksum failed. File is corrupted."
          fi
          EOF
          chmod +x reassemble.sh
          
          echo "Split into $(ls part_*.part | wc -l) chunks"

      - name: Create branch for chunks
        run: |
          git checkout --orphan model-chunks
          git rm -rf . 2>/dev/null || true
          mv part_*.part reassemble.sh checksum.txt .
          git add part_*.part reassemble.sh checksum.txt
          git commit -m "Model chunks - $(date)"
          git push origin model-chunks --force

      - name: Create info file on main branch
        run: |
          git checkout main
          cat > MODEL_INFO.md << EOF
          # Model Download Info
          
          - **Original URL:** ${{ github.event.inputs.model_url }}
          - **Total chunks:** $(ls ../part_*.part | wc -l) chunks of ${{ github.event.inputs.chunk_size_mb }}MB each
          - **Branch name:** \`model-chunks\`
          
          ## How to download (you have internet only for GitHub):
          
          1. \`git clone --branch model-chunks https://github.com/${{ github.repository }}.git model-files\`
          2. \`cd model-files\`
          3. \`bash reassemble.sh\`
          4. Done! The file \`model.safetensors\` will be created.
          
          ## Manual download:
          
          You can also download each \`.part\` file individually from GitHub UI:
          https://github.com/${{ github.repository }}/tree/model-chunks
          EOF
          
          git add MODEL_INFO.md
          git commit -m "Add model info" || echo "No changes"
          git push origin main
