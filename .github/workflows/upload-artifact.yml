name: Upload Existing Model Chunks as Artifact

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout model-chunks branch (to get the files)
        uses: actions/checkout@v4
        with:
          ref: model-chunks
          fetch-depth: 1

      - name: Verify files exist
        run: |
          echo "Checking for chunk files..."
          ls -la part_*.part 2>/dev/null | head -5
          echo "Total chunks: $(ls part_*.part 2>/dev/null | wc -l)"
          echo "reassemble.sh exists: $(ls -la reassemble.sh 2>/dev/null)"
          echo "checksum.txt exists: $(ls -la checksum.txt 2>/dev/null)"

      - name: Upload all chunks as artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-chunks-complete
          path: |
            part_*.part
            reassemble.sh
            checksum.txt
            *.part
          if-no-files-found: error
          retention-days: 7
