name: Split and Upload Large Model to Git Branch

on:
  workflow_dispatch:

jobs:
  split-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download the 4.5GB model
        run: |
          echo "Downloading model... (15-20 minutes)"
          wget -O model.safetensors "https://modelscope.cn/models/ACE-Step/acestep-v15-base/resolve/master/model.safetensors"
          ls -lh model.safetensors

      - name: Split into 95MB chunks
        run: |
          echo "Splitting file into 95MB chunks..."
          split -b 95m model.safetensors part_
          
          n=1
          for f in part_*; do 
            mv "$f" "part_$(printf "%03d" $n).part"
            n=$((n+1))
          done
          
          sha256sum model.safetensors > checksum.txt
          
          cat > reassemble.sh << 'EOF'
          #!/bin/bash
          echo "Reassembling model.safetensors..."
          cat part_*.part > model.safetensors
          echo "Verifying..."
          sha256sum -c checksum.txt
          if [ $? -eq 0 ]; then
            echo "✅ Success!"
            ls -lh model.safetensors
          else
            echo "❌ Error: File corrupted"
          fi
          EOF
          chmod +x reassemble.sh
          
          echo "Total chunks: $(ls part_*.part | wc -l)"

      - name: Create branch and upload chunks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create orphan branch (no history)
          git checkout --orphan model-files
          
          # Remove all workflow files
          rm -rf .github 2>/dev/null || true
          
          # Add only the chunk files
          git add part_*.part reassemble.sh checksum.txt
          git commit -m "Add model chunks"
          git push origin model-files --force
          
          echo "=========================================="
          echo "✅ DONE! Branch 'model-files' is ready."
          echo "=========================================="
